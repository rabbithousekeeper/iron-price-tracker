# Render Blueprint（Infrastructure as Code）
# https://render.com/docs/blueprint-spec
# Supabase PostgreSQLを外部DBとして使用

services:
  # バックエンドAPI（FastAPI + Supabase）
  - type: web
    name: price-tracker-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_DB_URL
        sync: false  # Renderダッシュボードから手動設定（Supabase PostgreSQL接続URL）
      - key: EIA_API_KEY
        sync: false  # Renderダッシュボードから手動設定
      - key: USE_REAL_DATA
        value: "true"
      - key: CORS_ORIGINS
        value: https://your-frontend-url.onrender.com
      - key: FETCH_INTERVAL_HOURS
        value: "168"
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
